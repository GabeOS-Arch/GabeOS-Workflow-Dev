# Limine Configuration for GabeOS
# Timeout in seconds (0 for no timeout, -1 for infinite)
timeout: 10

# Graphics mode
graphics: yes
theme_background: 0x0f0f23
theme_foreground: 0xe0e0e0
theme_margin: 64
theme_margin_gradient: 8

# Default entry
default_entry: 0

# Boot Entries

# Main boot entry
/GabeOS Live (x86_64)
    protocol: linux
    kernel_path: boot():/%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-zen
    module_path: boot():/%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-zen.img
    cmdline: archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% cow_spacesize=4G mitigations=off quiet splash

# Low memory mode
/GabeOS - Low Memory Mode (x86_64)
    protocol: linux
    kernel_path: boot():/%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-zen
    module_path: boot():/%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-zen.img
    cmdline: archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% cow_spacesize=2G mitigations=off systemd.unit=multi-user.target

# Safe mode (nomodeset)
/GabeOS - Safe Mode (nomodeset) (x86_64)
    protocol: linux
    kernel_path: boot():/%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-zen
    module_path: boot():/%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-zen.img
    cmdline: archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% cow_spacesize=4G nomodeset mitigations=off
