# GabeOS Loopback Configuration – UEFI (x86_64) only
# This file is used when booting the ISO from within another OS (loopback).

# Load essential modules
insmod part_gpt
insmod fat
insmod iso9660
insmod ntfs
insmod ntfscomp
insmod exfat
insmod udf
insmod gfxterm
insmod png
insmod jpeg
insmod tga

# Set theme for loopback boot
set theme="${prefix}/themes/modern/theme.txt"

# Load fonts
if loadfont "${prefix}/themes/modern/fonts/Ubuntu-Regular-20.pf2" ; then
    set gfxmode="auto"
    set gfxpayload=keep
    terminal_output gfxterm
fi

# Platform detection – UEFI only
if [ "${grub_platform}" == 'efi' ]; then
    if [ "${grub_cpu}" == 'x86_64' ]; then
        archiso_platform="x64 UEFI"
    else
        archiso_platform="${grub_cpu} UEFI"
    fi
else
    echo "ERROR: This media requires UEFI firmware. Legacy BIOS is not supported."
    echo "Please enable UEFI mode and disable CSM/Legacy boot in your firmware."
    sleep 10
    halt
fi

# Modern boot settings
default=archlinux
timeout=10
timeout_style=menu
splashimage="${prefix}/themes/modern/background.png"

# Main menu entries for loopback boot
menuentry "🚀 Arch Linux Live (%ARCH%, ${archiso_platform})" --class arch --class gnu-linux --class gnu --class os --id 'archlinux' {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux-zen archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% quiet splash
    initrd /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux-zen.img
}

# Memory testing (UEFI only)
if [ "${grub_platform}" == 'efi' -a "${grub_cpu}" == 'x86_64' -a -f '/boot/memtest86+/memtest.efi' ]; then
    menuentry '🔍 Run Memtest86+ (Memory Test)' --class memtest86 --class gnu --class tool {
        set gfxpayload=800x600,1024x768
        linux /boot/memtest86+/memtest.efi
    }
fi

# UEFI specific entries
if [ "${grub_platform}" == 'efi' ]; then
    if [ "${grub_cpu}" == 'x86_64' -a -f '/shellx64.efi' ]; then
        menuentry '💻 UEFI Shell' {
            chainloader /shellx64.efi
        }
    fi

    menuentry '⚙️  UEFI Firmware Settings' --id 'uefi-firmware' {
        fwsetup
    }
fi

# System control
menuentry '🔄 System Restart' --class reboot --class restart {
    echo 'System restarting...'
    reboot
}

menuentry '⏹️  System Shutdown' --class shutdown --class poweroff {
    echo 'System shutting down...'
    halt
}
