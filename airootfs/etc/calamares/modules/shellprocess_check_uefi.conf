#
# shellprocess_check_uefi.conf
# Fail fast if the system is not booted in UEFI mode.
# This runs early in the exec sequence, before partitioning begins.
---

dontChroot: true

script:
 - command: "/etc/calamares/scripts/check-uefi-prerequisites"
   timeout: 10

i18n:
 name: "Checking UEFI boot mode..."
