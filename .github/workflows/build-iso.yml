name: Build ISO and Upload to R2

on:
  push:
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Cache pacman package cache (host -> mounted into container)
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/pacman-pkg-cache
          key: ${{ runner.os }}-pacman-${{ hashFiles('**/build_iso.sh') }}

      - name: Build ISO inside an Arch container
        run: |
          mkdir -p out
          docker run --rm --privileged \
            -v "${{ github.workspace }}":/workspace \
            -v "${{ runner.temp }}/pacman-pkg-cache":/var/cache/pacman/pkg \
            -w /workspace \
            archlinux:latest /bin/bash -lc "
              set -e
              pacman -Sy --noconfirm
              pacman -S --noconfirm grub edk2-shell memtest86+ archiso arch-install-scripts base-devel sudo git curl python3 limine xorriso mtools dosfstools
              ./build_iso.sh
              chown -R $(id -u):$(id -g) out || true
            "

      - name: Install AWS CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y awscli

      - name: Upload ISO to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          set -euo pipefail

          ISO_FILE=$(ls out/*.iso | head -n1 || true)
          if [ -z "${ISO_FILE}" ]; then
            echo "No ISO found in out/*.iso — failing"
            exit 1
          fi

          ISO_NAME=$(basename "$ISO_FILE")
          R2_ENDPOINT_URL="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"

          echo "Uploading ${ISO_NAME} to s3://${R2_BUCKET_NAME}/${ISO_NAME} via ${R2_ENDPOINT_URL}"
          aws --version
          aws s3 cp "$ISO_FILE" "s3://${R2_BUCKET_NAME}/${ISO_NAME}" --endpoint-url "${R2_ENDPOINT_URL}"
          echo "Uploaded."
